<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDSW Regulatory Timeline 2026-2030</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* OKLCH palette — neutrals tinted toward HealthTech yellow hue (~90) */
    --surface-0: oklch(97.5% 0.006 90);    /* page bg */
    --surface-1: oklch(99% 0.003 90);      /* cards / sidebar */
    --surface-2: oklch(95.5% 0.008 90);    /* hover bg */
    --surface-3: oklch(91% 0.012 90);      /* borders */

    --ink-primary: oklch(20% 0.025 260);   /* #12305d navy-tinted */
    --ink-secondary: oklch(38% 0.018 260);
    --ink-tertiary: oklch(52% 0.012 260);
    --ink-muted: oklch(65% 0.008 260);

    --gold: oklch(85% 0.17 90);            /* #ffc800 HealthTech yellow */
    --gold-soft: oklch(95% 0.05 90);
    --gold-dim: oklch(72% 0.14 90);

    --accent: oklch(62% 0.22 30);          /* #ff512c secondary orange */
    --accent-soft: oklch(93% 0.04 30);

    --navy: oklch(24% 0.07 260);           /* #12305d HealthTech navy */
    --navy-mid: oklch(30% 0.06 260);

    /* Semantic topic colors in OKLCH */
    --c-mdr: oklch(52% 0.14 260);
    --c-ai: oklch(48% 0.18 300);
    --c-standards: oklch(50% 0.14 160);
    --c-cyber: oklch(52% 0.18 25);
    --c-france: oklch(58% 0.16 75);
    --c-uk: oklch(48% 0.14 275);
    --c-us: oklch(52% 0.18 340);
    --c-other: oklch(48% 0.12 195);
    --c-data: oklch(48% 0.16 290);

    /* Spacing on 4pt grid */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    --space-3xl: 64px;
    --space-4xl: 96px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    background: var(--surface-0);
    color: var(--ink-primary);
    -webkit-font-smoothing: antialiased;
    font-size: 1rem;
    line-height: 1.5;
    font-kerning: normal;
  }

  /* ===== HEADER (compact) ===== */
  .header {
    background: var(--navy);
    padding: var(--space-lg) var(--space-xl);
  }
  .header-inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: var(--space-lg);
    flex-wrap: wrap;
  }
  .header-left {
    display: flex;
    align-items: flex-start;
    gap: var(--space-md);
  }
  .header-logo {
    height: 36px;
    width: auto;
  }
  .header h1 {
    margin-top: 1px;
  }
  .header h1 {
    font-size: 1.125rem;
    font-weight: 500;
    color: oklch(98% 0.005 90);
    line-height: 1.2;
  }
  .header-meta {
    font-size: 0.6875rem;
    font-weight: 500;
    color: oklch(62% 0.01 260);
  }
  .header-meta::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    margin-right: 6px;
    vertical-align: middle;
  }

  /* ===== LAYOUT: sidebar + content ===== */
  .page-layout {
    max-width: 1080px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: var(--space-xl);
    padding: var(--space-2xl) var(--space-xl) var(--space-4xl);
    align-items: start;
  }

  /* ===== FILTERS (sidebar) ===== */
  .filters-sidebar {
    position: sticky;
    top: var(--space-lg);
    padding: var(--space-md);
    background: oklch(99% 0.003 90 / 0.8);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid var(--surface-3);
    border-radius: 12px;
  }
  .filters-label {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: var(--space-sm);
  }
  .filters {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-btn {
    padding: 6px 10px;
    border-radius: 4px;
    border: 1.5px solid transparent;
    background: transparent;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
    text-align: left;
    width: 100%;
  }
  .filter-btn:hover {
    background: var(--surface-2);
  }
  .filter-btn.active {
    background: var(--ink-primary);
    color: var(--surface-1);
  }
  .filter-btn.excluded {
    background: var(--surface-2);
    color: var(--ink-muted);
    text-decoration: line-through;
    opacity: 0.6;
  }
  .filter-btn .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn-all {
    color: var(--navy);
    font-weight: 600;
  }
  .filter-btn-all.active {
    background: var(--gold);
    color: var(--navy);
  }
  .filter-sep {
    height: 1px;
    background: var(--surface-3);
    margin: var(--space-sm) 0;
  }
  .filter-stats {
    margin-top: var(--space-md);
    padding-top: var(--space-md);
    border-top: 1px solid var(--surface-3);
  }
  .filter-stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 3px 0;
  }
  .filter-stat-label {
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .filter-stat-num {
    font-family: 'Poppins', sans-serif;
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--ink-primary);
    font-variant-numeric: tabular-nums;
  }

  /* ===== CONTENT AREA ===== */
  .content { min-width: 0; }

  /* ===== YEAR ===== */
  .year-section {
    margin-bottom: var(--space-3xl);
  }
  .year-header {
    display: flex;
    align-items: baseline;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }
  .year-label {
    font-size: clamp(2rem, 3.5vw, 2.75rem);
    font-weight: 500;
    color: var(--ink-primary);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .year-count {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-muted);
  }
  .year-rule {
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--surface-3) 60%);
    border: none;
    margin-bottom: var(--space-lg);
  }

  /* ===== TIMELINE GRID ===== */
  .tl-grid {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 0;
    position: relative;
  }
  .tl-grid::before {
    content: '';
    position: absolute;
    left: 110px;
    top: 0;
    bottom: 0;
    width: 1.5px;
    background: var(--surface-3);
  }

  /* ===== MILESTONE ===== */
  .ms {
    display: contents;
    transition: opacity 0.25s;
  }
  .ms.hidden { display: none; }

  .ms-date {
    padding: var(--space-md) var(--space-md) var(--space-md) 0;
    text-align: right;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--ink-tertiary);
    line-height: 1.6;
    font-variant-numeric: tabular-nums;
    position: relative;
  }
  .ms-date::after {
    content: '';
    position: absolute;
    right: -5px;
    top: 22px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    z-index: 2;
  }

  .ms-body {
    padding: var(--space-md) 0 var(--space-2xl) var(--space-lg);
  }

  /* Variants */
  .ms--critical .ms-body {
    background: var(--navy);
    padding: var(--space-lg);
    margin-left: var(--space-lg);
    margin-bottom: var(--space-md);
    border-radius: 12px;
  }
  .ms--critical .ms-title { color: oklch(96% 0.005 90); }
  .ms--critical .ms-title a:hover { color: var(--gold); }
  .ms--critical .ms-desc { color: oklch(72% 0.01 260); line-height: 1.65; }
  .ms--critical .ms-tag { background: var(--gold); color: var(--navy); }

  .ms--highlight .ms-body {
    background: var(--gold-soft);
    padding: var(--space-lg);
    margin-left: var(--space-lg);
    margin-bottom: var(--space-md);
    border-radius: 12px;
  }

  .ms-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: var(--space-sm);
  }
  .ms-tag {
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
  }
  .tag-critical { background: var(--gold); color: var(--navy); font-weight: 700; }
  .tag-high { background: var(--gold-dim); color: var(--navy); }
  .tag-medium { background: var(--surface-3); color: var(--ink-secondary); }
  .tag-new { background: oklch(50% 0.14 160); color: oklch(98% 0.005 90); }
  .tag-in-force { background: var(--navy); color: var(--gold); }
  .tag-draft { background: var(--ink-muted); color: oklch(98% 0.005 90); }
  .tag-proposed { background: oklch(48% 0.16 290); color: oklch(98% 0.005 90); }

  .ms-title {
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--ink-primary);
    line-height: 1.4;
  }
  .ms-title a {
    color: inherit;
    text-decoration: none;
    text-decoration-thickness: 1px;
    text-underline-offset: 2px;
  }
  .ms-title a:hover {
    text-decoration: underline;
    color: var(--gold-dim);
  }
  .ms-desc {
    font-size: 0.8125rem;
    color: var(--ink-secondary);
    line-height: 1.6;
    margin-top: var(--space-xs);
    max-width: 65ch;
  }
  .ms-topics {
    display: flex;
    gap: var(--space-xs);
    flex-wrap: wrap;
    margin-top: var(--space-sm);
  }
  .tp {
    font-size: 0.625rem;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .tp-mdr { background: oklch(92% 0.04 260); color: oklch(35% 0.1 260); }
  .tp-ai { background: oklch(92% 0.04 300); color: oklch(35% 0.12 300); }
  .tp-standards { background: oklch(93% 0.04 160); color: oklch(32% 0.1 160); }
  .tp-cyber { background: oklch(93% 0.04 25); color: oklch(38% 0.12 25); }
  .tp-france { background: oklch(94% 0.04 75); color: oklch(38% 0.12 75); }
  .tp-uk { background: oklch(92% 0.04 275); color: oklch(35% 0.1 275); }
  .tp-us { background: oklch(93% 0.04 340); color: oklch(38% 0.12 340); }
  .tp-other { background: oklch(93% 0.04 195); color: oklch(35% 0.1 195); }
  .tp-data { background: oklch(93% 0.04 290); color: oklch(35% 0.12 290); }

  /* Dot colors */
  .ms[data-lead="mdr"] .ms-date::after { background: var(--c-mdr); }
  .ms[data-lead="ai"] .ms-date::after { background: var(--c-ai); }
  .ms[data-lead="standards"] .ms-date::after { background: var(--c-standards); }
  .ms[data-lead="cyber"] .ms-date::after { background: var(--c-cyber); }
  .ms[data-lead="france"] .ms-date::after { background: var(--c-france); }
  .ms[data-lead="uk"] .ms-date::after { background: var(--c-uk); }
  .ms[data-lead="us"] .ms-date::after { background: var(--c-us); }
  .ms[data-lead="other"] .ms-date::after { background: var(--c-other); }
  .ms[data-lead="data"] .ms-date::after { background: var(--c-data); }

  /* ===== FOOTER ===== */
  .footer {
    background: var(--navy);
    padding: var(--space-2xl) var(--space-xl);
  }
  .footer-inner {
    max-width: 1080px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-xl);
    flex-wrap: wrap;
  }
  .footer-logo {
    height: 28px;
    width: auto;
    opacity: 0.7;
  }
  .footer p {
    font-size: 0.6875rem;
    color: oklch(55% 0.01 250);
    line-height: 1.6;
    max-width: 52ch;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .page-layout {
      grid-template-columns: 1fr;
      padding: var(--space-lg) var(--space-md) var(--space-2xl);
    }
    .filters-sidebar {
      position: static;
      border-bottom: 1px solid var(--surface-3);
      padding-bottom: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    .filters {
      flex-direction: row;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-btn { width: auto; }
    .filter-stats { display: none; }
    .filter-sep { display: none; }
    .tl-grid { grid-template-columns: 1fr; }
    .tl-grid::before { display: none; }
    .ms-date {
      text-align: left;
      padding: var(--space-md) 0 0 0;
    }
    .ms-date::after { display: none; }
    .ms-body { padding: var(--space-xs) 0 var(--space-xl) 0; }
    .ms--critical .ms-body,
    .ms--highlight .ms-body { margin-left: 0; }
    .header { padding: var(--space-md); }
    .header-inner { flex-direction: column; gap: var(--space-xs); }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <img src="logo.png" alt="Theodo HealthTech" class="header-logo">
      <h1>MDSW Regulatory Timeline 2026&ndash;2030</h1>
    </div>
    <span class="header-meta">Updated 16 April 2026</span>
  </div>
</header>

<div class="page-layout">
  <aside class="filters-sidebar">
    <div class="filters-label">Topics</div>
    <div class="filters" id="filters">
      <button class="filter-btn filter-btn-all active" data-topic="all">All topics</button>
      <div class="filter-sep"></div>
      <button class="filter-btn" data-topic="mdr"><span class="dot" style="background:var(--c-mdr)"></span>EU MDR/IVDR</button>
      <button class="filter-btn" data-topic="ai"><span class="dot" style="background:var(--c-ai)"></span>AI Act</button>
      <button class="filter-btn" data-topic="standards"><span class="dot" style="background:var(--c-standards)"></span>Standards</button>
      <button class="filter-btn" data-topic="cyber"><span class="dot" style="background:var(--c-cyber)"></span>Cybersecurity</button>
      <button class="filter-btn" data-topic="france"><span class="dot" style="background:var(--c-france)"></span>France</button>
      <button class="filter-btn" data-topic="data"><span class="dot" style="background:var(--c-data)"></span>Data / EHDS</button>
      <button class="filter-btn" data-topic="uk"><span class="dot" style="background:var(--c-uk)"></span>UK</button>
      <button class="filter-btn" data-topic="us"><span class="dot" style="background:var(--c-us)"></span>US (FDA)</button>
      <button class="filter-btn" data-topic="other"><span class="dot" style="background:var(--c-other)"></span>Other Regions</button>
    </div>
    <div class="filter-stats">
      <div class="filter-stat"><span class="filter-stat-label">Showing</span><span class="filter-stat-num" id="s-visible">0</span></div>
      <div class="filter-stat"><span class="filter-stat-label">Total</span><span class="filter-stat-num" id="s-total">0</span></div>
      <div class="filter-stat"><span class="filter-stat-label">Urgent</span><span class="filter-stat-num" id="s-urgent">0</span></div>
    </div>
  </aside>

  <div class="content">
    <div id="tl"></div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div><img src="logo.png" alt="Theodo HealthTech" class="footer-logo"></div>
    <p>Based on publicly available regulatory information as of April 2026. Dates are indicative and subject to change. This is not legal advice.</p>
  </div>
</footer>

<script>
// Utilities
function cardId(m){ return m.d+"__"+m.t.slice(0,40).replace(/\W+/g,"_"); }
function lsGet(k){ try { return JSON.parse(localStorage.getItem(k)||"[]"); } catch(e){ return []; } }

const TL={mdr:"EU MDR/IVDR",ai:"AI Act",standards:"Standards",cyber:"Cybersecurity",france:"France",uk:"UK",us:"US (FDA)",other:"Other Regions",data:"Data / EHDS"};
const TG={critical:"CRITICAL",high:"HIGH",medium:"MEDIUM","new":"NEW","in-force":"IN FORCE",draft:"DRAFT",proposed:"PROPOSED"};

let M = [];

// 3-state filter logic
const included = new Set();
const excluded = new Set();

function getState(topic) {
  if (included.has(topic)) return "include";
  if (excluded.has(topic)) return "exclude";
  return "off";
}
function cycleState(topic) {
  const s = getState(topic);
  if (s === "off") included.add(topic);
  else if (s === "include") { included.delete(topic); excluded.add(topic); }
  else excluded.delete(topic);
}
function isAllDefault() { return included.size === 0 && excluded.size === 0; }

function isVis(m) {
  const hidden = new Set(lsGet("rw_hidden_cards"));
  if (hidden.has(cardId(m))) return false;
  if (isAllDefault()) return true;
  if (included.size > 0) return m.tp.some(t => included.has(t));
  if (m.tp.some(t => excluded.has(t))) return false;
  return true;
}

function syncButtons() {
  const allBtn = document.querySelector(".filter-btn-all");
  allBtn.classList.toggle("active", isAllDefault());
  document.querySelectorAll(".filter-btn:not(.filter-btn-all)").forEach(btn => {
    const t = btn.dataset.topic;
    btn.classList.remove("active", "excluded");
    if (included.has(t)) btn.classList.add("active");
    else if (excluded.has(t)) btn.classList.add("excluded");
  });
}

function render() {
  const el = document.getElementById("tl");
  const years = [...new Set(M.map(m => m.y))].sort();
  let html = "", vis = 0, urg = 0;

  years.forEach(yr => {
    const ym = M.filter(m => m.y === yr);
    const shown = ym.filter(isVis);
    if (!shown.length) return;
    html += `<section class="year-section"><div class="year-header"><span class="year-label">${yr}</span><span class="year-count">${shown.length} milestone${shown.length !== 1 ? "s" : ""}</span></div><hr class="year-rule"><div class="tl-grid">`;
    ym.forEach(m => {
      const ok = isVis(m);
      if (ok) { vis++; if (m.tg.includes("critical") || m.tg.includes("high")) urg++; }
      const cls = m.v === "c" ? "ms--critical" : m.v === "h" ? "ms--highlight" : "";
      html += `<div class="ms ${cls} ${ok ? "" : "hidden"}" data-topics="${m.tp.join(",")}" data-lead="${m.tp[0]}">`;
      html += `<div class="ms-date">${m.l}</div><div class="ms-body">`;
      html += `<div class="ms-tags">${m.tg.map(g => `<span class="ms-tag tag-${g}">${TG[g] || g}</span>`).join("")}</div>`;
      html += `<div class="ms-title">${m.u ? `<a href="${m.u}" target="_blank" rel="noopener">${m.t}</a>` : m.t}</div>`;
      html += `<div class="ms-desc">${m.x}</div>`;
      html += `<div class="ms-topics">${m.tp.map(p => `<span class="tp tp-${p}">${TL[p] || p}</span>`).join("")}</div>`;
      html += `</div></div>`;
    });
    html += `</div></section>`;
  });
  el.innerHTML = html;
  document.getElementById("s-total").textContent = M.length;
  document.getElementById("s-visible").textContent = vis;
  document.getElementById("s-urgent").textContent = urg;
}

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  const t = btn.dataset.topic;
  if (t === "all") { included.clear(); excluded.clear(); }
  else cycleState(t);
  syncButtons();
  render();
});

// Load data and proposals, merge, then render
async function init() {
  try {
    const resp = await fetch("data.json");
    if (!resp.ok) throw new Error("data.json failed");
    const base = await resp.json();

    // Load proposals + approval state
    let proposals = [];
    try {
      const pResp = await fetch("proposals.json");
      if (pResp.ok) { const pd = await pResp.json(); proposals = pd.proposals || []; }
    } catch(e) {}

    const approved = new Set(lsGet("rw_approved_proposals"));
    const deleted = new Set(lsGet("rw_deleted_cards"));

    // Start with base milestones, remove deleted
    M = base.filter(m => !deleted.has(cardId(m)));

    // Add approved "add" proposals, apply approved "update" proposals
    proposals.forEach(p => {
      if (!approved.has(p.id)) return;
      if (p.action === "add" && p.card) {
        M.push(p.card);
      } else if (p.action === "update" && p.card && p.existing_id) {
        const idx = M.findIndex(m => cardId(m) === p.existing_id);
        if (idx >= 0) M[idx] = p.card;
        else M.push(p.card);
      }
      // "delete" handled via rw_deleted_cards
    });

    M.sort((a, b) => new Date(a.d) - new Date(b.d));
  } catch(e) {
    console.error("Failed to load timeline data:", e);
    document.getElementById("tl").innerHTML = '<p style="padding:32px;color:var(--ink-muted);">Failed to load timeline data.</p>';
    return;
  }

  syncButtons();
  render();
}

init();
</script>
</body>
</html>
