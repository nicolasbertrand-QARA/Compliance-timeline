<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back Office | MDSW Regulatory Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-0: oklch(97.5% 0.006 90);
    --surface-1: oklch(99% 0.003 90);
    --surface-2: oklch(95.5% 0.008 90);
    --surface-3: oklch(91% 0.012 90);
    --ink-primary: oklch(20% 0.025 260);
    --ink-secondary: oklch(38% 0.018 260);
    --ink-tertiary: oklch(52% 0.012 260);
    --ink-muted: oklch(65% 0.008 260);
    --gold: oklch(85% 0.17 90);
    --gold-soft: oklch(95% 0.05 90);
    --gold-dim: oklch(72% 0.14 90);
    --accent: oklch(62% 0.22 30);
    --navy: oklch(24% 0.07 260);
    --navy-mid: oklch(30% 0.06 260);
    --c-mdr: oklch(52% 0.14 260);
    --c-ai: oklch(48% 0.18 300);
    --c-standards: oklch(50% 0.14 160);
    --c-cyber: oklch(52% 0.18 25);
    --c-france: oklch(58% 0.16 75);
    --c-uk: oklch(48% 0.14 275);
    --c-us: oklch(52% 0.18 340);
    --c-other: oklch(48% 0.12 195);
    --c-data: oklch(48% 0.16 290);
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', system-ui, sans-serif;
    background: var(--surface-0);
    color: var(--ink-primary);
    -webkit-font-smoothing: antialiased;
    font-size: 0.875rem;
    line-height: 1.5;
  }

  .topbar {
    background: var(--navy);
    padding: var(--space-md) var(--space-xl);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-lg);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .topbar-logo { height: 24px; width: auto; }
  .topbar h1 {
    font-size: 0.875rem;
    font-weight: 500;
    color: oklch(80% 0.008 260);
  }
  .topbar h1 span { color: var(--gold); font-weight: 600; }
  .topbar-link {
    font-size: 0.75rem;
    font-weight: 500;
    color: oklch(65% 0.01 260);
    text-decoration: none;
    transition: color 0.15s;
  }
  .topbar-link:hover { color: var(--gold); }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: var(--space-2xl) var(--space-xl);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
    flex-wrap: wrap;
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    flex: 1;
    min-width: 200px;
  }
  .search {
    flex: 1;
    max-width: 360px;
    padding: 8px 12px;
    border: 1.5px solid var(--surface-3);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.8125rem;
    background: var(--surface-1);
    color: var(--ink-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--gold); }
  .search::placeholder { color: var(--ink-muted); }

  .counter {
    font-size: 0.75rem;
    color: var(--ink-muted);
    white-space: nowrap;
  }
  .counter strong { color: var(--ink-primary); font-weight: 600; }

  .toolbar-actions {
    display: flex;
    gap: var(--space-sm);
  }
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-show {
    background: var(--gold-soft);
    color: var(--gold-dim);
  }
  .btn-show:hover { background: var(--gold); color: var(--navy); }
  .btn-hide {
    background: var(--surface-2);
    color: var(--ink-tertiary);
  }
  .btn-hide:hover { background: var(--surface-3); color: var(--ink-primary); }

  /* Table */
  .tbl {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }
  .tbl th {
    text-align: left;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: var(--space-sm) var(--space-md);
    border-bottom: 2px solid var(--surface-3);
    position: sticky;
    top: 0;
    background: var(--surface-0);
    z-index: 2;
  }
  .tbl td {
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--surface-3);
    vertical-align: middle;
  }
  .tbl tr:last-child td { border-bottom: none; }

  .tbl tr.row-hidden { opacity: 0.4; }
  .tbl tr.row-hidden .cell-title { text-decoration: line-through; }

  .tbl tr:hover { background: var(--surface-2); }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .toggle input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 1;
    margin: 0;
  }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--surface-3);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: var(--surface-1);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track {
    background: var(--gold);
  }
  .toggle input:checked + .toggle-track::after {
    transform: translateX(16px);
  }

  .cell-date {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-tertiary);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    width: 100px;
  }
  .cell-title {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--ink-primary);
    line-height: 1.35;
  }
  .cell-topics {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tp {
    font-size: 0.5625rem;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .tp-mdr { background: oklch(92% 0.04 260); color: oklch(35% 0.1 260); }
  .tp-ai { background: oklch(92% 0.04 300); color: oklch(35% 0.12 300); }
  .tp-standards { background: oklch(93% 0.04 160); color: oklch(32% 0.1 160); }
  .tp-cyber { background: oklch(93% 0.04 25); color: oklch(38% 0.12 25); }
  .tp-france { background: oklch(94% 0.04 75); color: oklch(38% 0.12 75); }
  .tp-uk { background: oklch(92% 0.04 275); color: oklch(35% 0.1 275); }
  .tp-us { background: oklch(93% 0.04 340); color: oklch(38% 0.12 340); }
  .tp-other { background: oklch(93% 0.04 195); color: oklch(35% 0.1 195); }
  .tp-data { background: oklch(93% 0.04 290); color: oklch(35% 0.12 290); }

  .cell-toggle { width: 52px; text-align: center; }

  .ms-tag {
    display: inline-block;
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag-critical { background: var(--gold); color: var(--navy); }
  .tag-high { background: var(--gold-dim); color: var(--navy); }
  .tag-medium { background: var(--surface-3); color: var(--ink-secondary); }
  .tag-new { background: oklch(50% 0.14 160); color: oklch(98% 0.005 90); }
  .tag-in-force { background: var(--navy); color: var(--gold); }

  /* Year group header */
  .year-row td {
    padding: var(--space-md) var(--space-md) var(--space-sm);
    border-bottom: 2px solid var(--gold);
    background: var(--surface-0);
  }
  .year-row-label {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--ink-primary);
  }

  /* Saved toast */
  .toast {
    position: fixed;
    bottom: var(--space-xl);
    right: var(--space-xl);
    background: var(--navy);
    color: var(--gold);
    padding: var(--space-sm) var(--space-lg);
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 640px) {
    .page { padding: var(--space-lg) var(--space-md); }
    .toolbar { flex-direction: column; align-items: stretch; }
    .tbl th:nth-child(3), .tbl td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="https://cdn.prod.website-files.com/6850272ec839a090ed996f46/68c98307d72aef67f50014d9_68c905ee252fff8d68ba2807_logo-healthtech.svg" alt="Theodo HealthTech" class="topbar-logo">
    <h1>Regulatory Timeline <span>Back Office</span></h1>
  </div>
  <a href="regulatory-timeline.html" class="topbar-link">&larr; View timeline</a>
</div>

<div class="page">
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" class="search" id="search" placeholder="Search milestones...">
      <span class="counter"><strong id="cnt-visible">0</strong> / <span id="cnt-total">0</span> visible</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-show" id="btn-show-all">Show all</button>
      <button class="btn btn-hide" id="btn-hide-all">Hide all</button>
    </div>
  </div>

  <table class="tbl" id="tbl">
    <thead>
      <tr>
        <th>Visible</th>
        <th>Date</th>
        <th>Topics</th>
        <th>Milestone</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast">Saved</div>

<script>
// Same milestone data as the timeline page
const M=[
{d:"2026-02-02",l:"2 Feb 2026",y:2026,t:"FDA QMSR In Force",x:"Incorporates ISO 13485:2016 by reference, replacing decades-old QSR.",tp:["us","standards"],tg:["in-force"]},
{d:"2026-01-26",l:"Jan 2026",y:2026,t:"South Korea: Fast-Track + AI Basic Act + DMPA",x:"Market access 80\u2013140 days, AI High-Impact, pre-approved change management.",tp:["other","ai"],tg:["new"]},
{d:"2026-03-10",l:"10 Mar 2026",y:2026,t:"Singapore AIHGle 2.0",x:"Refreshed AI in Healthcare Guidelines with seven ethical principles.",tp:["other","ai"],tg:["new"]},
{d:"2026-03-17",l:"17 Mar 2026",y:2026,t:"China NMPA YY/T 1406-2026",x:"Unified risk management standard. Effective 1 Mar 2027.",tp:["other","cyber"],tg:["new"]},
{d:"2026-04-10",l:"10 Apr 2026",y:2026,t:"MHRA Indefinite CE Mark Recognition",x:"Permanent recognition of CE-marked devices in GB. Consultation closed.",tp:["uk","mdr"],tg:["high"]},
{d:"2026-04-16",l:"16 Apr 2026",y:2026,t:"CNIL/HAS AI Healthcare Guide",x:"Joint guide on AI deployment in healthcare. Consultation closed.",tp:["france","ai"],tg:["critical"]},
{d:"2026-05-01",l:"May 2026",y:2026,t:"HIPAA Security Rule Overhaul",x:"MFA, encryption, network segmentation mandatory.",tp:["us"],tg:["high"]},
{d:"2026-05-06",l:"6 May 2026",y:2026,t:"MDR/IVDR Simplification \u2014 Feedback Deadline",x:"Revised Rule 11, removal of MD from AI Act scope.",tp:["mdr","ai"],tg:["critical"]},
{d:"2026-05-16",l:"16 May 2026",y:2026,t:"HDS v2.0 Mandatory (France)",x:"EEA-only hosting, ISO 27001 alignment.",tp:["france","data"],tg:["critical"]},
{d:"2026-05-22",l:"22 May 2026",y:2026,t:"IEC 62304 Ed.2 \u2014 Approval Phase",x:"Two Software Process Accuracy Levels replace three safety classes.",tp:["standards"],tg:["high"]},
{d:"2026-05-28",l:"28 May 2026",y:2026,t:"EUDAMED \u2014 First 4 Modules Mandatory",x:"Actor Registration, UDI/Device, NB & Certificates, Market Surveillance.",tp:["mdr"],tg:["critical"]},
{d:"2026-06-11",l:"11 Jun 2026",y:2026,t:"Cyber Resilience Act \u2014 CAB Notification",x:"MD under MDR/IVDR excluded but peripheral systems in scope.",tp:["cyber"],tg:["medium"]},
{d:"2026-07-01",l:"1 Jul 2026",y:2026,t:"Australia TGA \u2014 UDI (Class IIb/III)",x:"UDI requirements begin in Australia.",tp:["other"],tg:["medium"]},
{d:"2026-08-02",l:"Aug 2026",y:2026,t:"AI Act \u2014 Most Provisions Apply",x:"Digital Omnibus may delay for medical devices.",tp:["ai"],tg:["high"]},
{d:"2026-08-12",l:"12 Aug 2026",y:2026,t:"IEC 62304 Edition 2 \u2014 Publication",x:"Expanded scope to all health software. AI/ML process planning.",tp:["standards"],tg:["critical"]},
{d:"2026-09-01",l:"Sep 2026",y:2026,t:"NIS2 Directive \u2014 Full Implementation",x:"MD manufacturers in scope. Max fines EUR 10M / 2%.",tp:["cyber"],tg:["high"]},
{d:"2026-09-11",l:"11 Sep 2026",y:2026,t:"CRA \u2014 Vulnerability Reporting Begins",x:"24h reporting to ENISA.",tp:["cyber"],tg:["high"]},
{d:"2026-10-01",l:"Q4 2026",y:2026,t:"CEN-CENELEC JTC 21 \u2014 AI Standards",x:"10 harmonised standards target.",tp:["ai","standards"],tg:["high"]},
{d:"2026-10-15",l:"Late 2026",y:2026,t:"prEN 18286 \u2014 AI Act QMS Standard",x:"Under revision after failed Jan 2026 vote.",tp:["ai","standards"],tg:["medium"]},
{d:"2026-11-01",l:"Late 2026",y:2026,t:"UK Pre-Market SI \u2014 SaMD Up-Classification",x:"SaMD to at least Class IIa. UDI, reliance scheme.",tp:["uk"],tg:["high"]},
{d:"2026-11-28",l:"28 Nov 2026",y:2026,t:"EUDAMED \u2014 Existing Devices Deadline",x:"All existing devices must be registered.",tp:["mdr"],tg:["high"]},
{d:"2026-12-01",l:"Late 2026",y:2026,t:"Health Data Hub \u2192 SecNumCloud",x:"Sovereign cloud migration.",tp:["france","data"],tg:["medium"]},
{d:"2026-12-15",l:"Late 2026",y:2026,t:"UK AI Commission Recommendations",x:"Regulatory rulebook for AI/ML medical devices.",tp:["uk","ai"],tg:["medium"]},
{d:"2027-01-01",l:"2027",y:2027,t:"Brazil ANVISA \u2014 UDI (Class II)",x:"UDI extends to Class II.",tp:["other"],tg:["medium"]},
{d:"2027-03-01",l:"Mar 2027",y:2027,t:"EHDS \u2014 Implementing Acts Deadline",x:"Cross-border health data framework.",tp:["data","mdr"],tg:["high"]},
{d:"2027-03-01",l:"1 Mar 2027",y:2027,t:"China YY/T 1406-2026 Effective",x:"Unified risk framework mandatory.",tp:["other"],tg:["medium"]},
{d:"2027-05-28",l:"28 May 2027",y:2027,t:"EUDAMED \u2014 NB Certificate Registration",x:"Retrospective registration of all certificates.",tp:["mdr"],tg:["medium"]},
{d:"2027-06-01",l:"2027",y:2027,t:"MDR/IVDR Simplification \u2014 Earliest Adoption",x:"Rule 11 revision and AI Act scope changes.",tp:["mdr","ai"],tg:["high"]},
{d:"2027-12-02",l:"Dec 2027",y:2027,t:"AI Act High-Risk Annex III (If Delayed)",x:"Potential delayed application.",tp:["ai"],tg:["high"]},
{d:"2027-12-11",l:"11 Dec 2027",y:2027,t:"CRA \u2014 Full Application",x:"All requirements fully applicable.",tp:["cyber"],tg:["high"]},
{d:"2028-01-01",l:"2028",y:2028,t:"Brazil ANVISA \u2014 UDI (Class I)",x:"Full phase-in complete.",tp:["other"],tg:["medium"]},
{d:"2028-06-01",l:"2028\u20132029",y:2028,t:"ISO 13485 New Edition",x:"Expected to include cybersecurity and AI.",tp:["standards"],tg:["medium"]},
{d:"2028-08-02",l:"Aug 2028",y:2028,t:"AI Act Annex I / Medical Devices (If Delayed)",x:"Potential delayed application for MD.",tp:["ai","mdr"],tg:["critical"]},
{d:"2028-12-31",l:"Dec 2028",y:2028,t:"UK MHRA \u2014 MDD Transitional End",x:"Old EU MDD devices must transition.",tp:["uk","mdr"],tg:["high"]},
{d:"2029-03-01",l:"Mar 2029",y:2029,t:"EHDS \u2014 Primary Use Provisions",x:"Patient Summaries, ePrescriptions across EU.",tp:["data","mdr"],tg:["high"]},
{d:"2030-01-01",l:"2030",y:2030,t:"EU MDR/IVDR Full Maturity",x:"All transitional periods expired.",tp:["mdr","ai"],tg:["medium"]},
{d:"2030-06-01",l:"2030",y:2030,t:"WHO Digital Health Strategy Mid-Term",x:"Mid-point of 2028\u20132033 strategy.",tp:["other"],tg:["medium"]}
];

M.sort((a,b)=>new Date(a.d)-new Date(b.d));

const TL={mdr:"EU MDR/IVDR",ai:"AI Act",standards:"Standards",cyber:"Cybersecurity",france:"France",uk:"UK",us:"US (FDA)",other:"Other Regions",data:"Data / EHDS"};
const TG={critical:"CRITICAL",high:"HIGH",medium:"MEDIUM","new":"NEW","in-force":"IN FORCE"};

function cardId(m){ return m.d+"__"+m.t.slice(0,40).replace(/\W+/g,"_"); }

function getHidden(){
  try { return new Set(JSON.parse(localStorage.getItem("rw_hidden_cards")||"[]")); }
  catch(e){ return new Set(); }
}
function saveHidden(set){
  localStorage.setItem("rw_hidden_cards",JSON.stringify([...set]));
  showToast();
}

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("visible");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("visible"),1200);
}

let hidden=getHidden();
let query="";

function buildTable(){
  const tbody=document.getElementById("tbody");
  let html="";
  let lastYear=null;
  let visCount=0;

  M.forEach(m=>{
    const id=cardId(m);
    const isHidden=hidden.has(id);

    // Search filter
    const q=query.toLowerCase();
    if(q && !m.t.toLowerCase().includes(q) && !m.x.toLowerCase().includes(q) && !m.tp.some(t=>TL[t].toLowerCase().includes(q))){
      return;
    }

    if(!isHidden) visCount++;

    // Year group
    if(m.y!==lastYear){
      html+=`<tr class="year-row"><td colspan="4"><span class="year-row-label">${m.y}</span></td></tr>`;
      lastYear=m.y;
    }

    const rowCls=isHidden?"row-hidden":"";
    html+=`<tr class="${rowCls}" data-id="${id}">`;
    html+=`<td class="cell-toggle"><label class="toggle"><input type="checkbox" ${isHidden?"":"checked"} data-id="${id}"><span class="toggle-track"></span></label></td>`;
    html+=`<td class="cell-date">${m.l}</td>`;
    html+=`<td><div class="cell-topics">${m.tp.map(p=>`<span class="tp tp-${p}">${TL[p]}</span>`).join("")}</div></td>`;
    html+=`<td><span class="cell-title">${m.tg.map(g=>`<span class="ms-tag tag-${g}">${TG[g]||g}</span>`).join("")} ${m.t}</span></td>`;
    html+=`</tr>`;
  });

  tbody.innerHTML=html;
  document.getElementById("cnt-visible").textContent=visCount;
  document.getElementById("cnt-total").textContent=M.length;
}

// Toggle handler
document.getElementById("tbody").addEventListener("change",e=>{
  if(!e.target.matches("input[type=checkbox]"))return;
  const id=e.target.dataset.id;
  if(e.target.checked){ hidden.delete(id); }
  else{ hidden.add(id); }
  saveHidden(hidden);
  buildTable();
});

// Search
document.getElementById("search").addEventListener("input",e=>{
  query=e.target.value;
  buildTable();
});

// Show all
document.getElementById("btn-show-all").addEventListener("click",()=>{
  hidden.clear();
  saveHidden(hidden);
  buildTable();
});

// Hide all
document.getElementById("btn-hide-all").addEventListener("click",()=>{
  M.forEach(m=>hidden.add(cardId(m)));
  saveHidden(hidden);
  buildTable();
});

buildTable();
</script>
</body>
</html>
