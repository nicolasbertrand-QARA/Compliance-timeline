<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back Office | MDSW Regulatory Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --surface-0: oklch(97.5% 0.006 90);
    --surface-1: oklch(99% 0.003 90);
    --surface-2: oklch(95.5% 0.008 90);
    --surface-3: oklch(91% 0.012 90);
    --ink-primary: oklch(20% 0.025 260);
    --ink-secondary: oklch(38% 0.018 260);
    --ink-tertiary: oklch(52% 0.012 260);
    --ink-muted: oklch(65% 0.008 260);
    --gold: oklch(85% 0.17 90);
    --gold-soft: oklch(95% 0.05 90);
    --gold-dim: oklch(72% 0.14 90);
    --accent: oklch(62% 0.22 30);
    --navy: oklch(24% 0.07 260);
    --navy-mid: oklch(30% 0.06 260);
    --c-mdr: oklch(52% 0.14 260);
    --c-ai: oklch(48% 0.18 300);
    --c-standards: oklch(50% 0.14 160);
    --c-cyber: oklch(52% 0.18 25);
    --c-france: oklch(58% 0.16 75);
    --c-uk: oklch(48% 0.14 275);
    --c-us: oklch(52% 0.18 340);
    --c-other: oklch(48% 0.12 195);
    --c-data: oklch(48% 0.16 290);
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', system-ui, sans-serif;
    background: var(--surface-0);
    color: var(--ink-primary);
    -webkit-font-smoothing: antialiased;
    font-size: 0.875rem;
    line-height: 1.5;
  }

  .topbar {
    background: var(--navy);
    padding: var(--space-md) var(--space-xl);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-lg);
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .topbar-logo { height: 24px; width: auto; }
  .topbar h1 {
    font-size: 0.875rem;
    font-weight: 500;
    color: oklch(80% 0.008 260);
  }
  .topbar h1 span { color: var(--gold); font-weight: 600; }
  .topbar-link {
    font-size: 0.75rem;
    font-weight: 500;
    color: oklch(65% 0.01 260);
    text-decoration: none;
    transition: color 0.15s;
  }
  .topbar-link:hover { color: var(--gold); }

  .page {
    max-width: 900px;
    margin: 0 auto;
    padding: var(--space-2xl) var(--space-xl);
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
    flex-wrap: wrap;
  }
  .toolbar-left {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    flex: 1;
    min-width: 200px;
  }
  .search {
    flex: 1;
    max-width: 360px;
    padding: 8px 12px;
    border: 1.5px solid var(--surface-3);
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.8125rem;
    background: var(--surface-1);
    color: var(--ink-primary);
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--gold); }
  .search::placeholder { color: var(--ink-muted); }

  .counter {
    font-size: 0.75rem;
    color: var(--ink-muted);
    white-space: nowrap;
  }
  .counter strong { color: var(--ink-primary); font-weight: 600; }

  .toolbar-actions {
    display: flex;
    gap: var(--space-sm);
  }
  .btn {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-show {
    background: var(--gold-soft);
    color: var(--gold-dim);
  }
  .btn-show:hover { background: var(--gold); color: var(--navy); }
  .btn-hide {
    background: var(--surface-2);
    color: var(--ink-tertiary);
  }
  .btn-hide:hover { background: var(--surface-3); color: var(--ink-primary); }

  /* Table */
  .tbl {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
  }
  .tbl th {
    text-align: left;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: var(--space-sm) var(--space-md);
    border-bottom: 2px solid var(--surface-3);
    position: sticky;
    top: 0;
    background: var(--surface-0);
    z-index: 2;
  }
  .tbl td {
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--surface-3);
    vertical-align: middle;
  }
  .tbl tr:last-child td { border-bottom: none; }

  .tbl tr.row-hidden { opacity: 0.4; }
  .tbl tr.row-hidden .cell-title { text-decoration: line-through; }

  .tbl tr:hover { background: var(--surface-2); }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
  }
  .toggle input {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    z-index: 1;
    margin: 0;
  }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--surface-3);
    border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    background: var(--surface-1);
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track {
    background: var(--gold);
  }
  .toggle input:checked + .toggle-track::after {
    transform: translateX(16px);
  }

  .cell-date {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink-tertiary);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    width: 100px;
  }
  .cell-title {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--ink-primary);
    line-height: 1.35;
  }
  .cell-topics {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tp {
    font-size: 0.5625rem;
    font-weight: 500;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .tp-mdr { background: oklch(92% 0.04 260); color: oklch(35% 0.1 260); }
  .tp-ai { background: oklch(92% 0.04 300); color: oklch(35% 0.12 300); }
  .tp-standards { background: oklch(93% 0.04 160); color: oklch(32% 0.1 160); }
  .tp-cyber { background: oklch(93% 0.04 25); color: oklch(38% 0.12 25); }
  .tp-france { background: oklch(94% 0.04 75); color: oklch(38% 0.12 75); }
  .tp-uk { background: oklch(92% 0.04 275); color: oklch(35% 0.1 275); }
  .tp-us { background: oklch(93% 0.04 340); color: oklch(38% 0.12 340); }
  .tp-other { background: oklch(93% 0.04 195); color: oklch(35% 0.1 195); }
  .tp-data { background: oklch(93% 0.04 290); color: oklch(35% 0.12 290); }

  .cell-toggle { width: 52px; text-align: center; }

  .ms-tag {
    display: inline-block;
    font-size: 0.5625rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    margin-right: 4px;
    vertical-align: middle;
  }
  .tag-critical { background: var(--gold); color: var(--navy); }
  .tag-high { background: var(--gold-dim); color: var(--navy); }
  .tag-medium { background: var(--surface-3); color: var(--ink-secondary); }
  .tag-new { background: oklch(50% 0.14 160); color: oklch(98% 0.005 90); }
  .tag-in-force { background: var(--navy); color: var(--gold); }

  /* Year group header */
  .year-row td {
    padding: var(--space-md) var(--space-md) var(--space-sm);
    border-bottom: 2px solid var(--gold);
    background: var(--surface-0);
  }
  .year-row-label {
    font-size: 1.25rem;
    font-weight: 500;
    color: var(--ink-primary);
  }

  /* Saved toast */
  .toast {
    position: fixed;
    bottom: var(--space-xl);
    right: var(--space-xl);
    background: var(--navy);
    color: var(--gold);
    padding: var(--space-sm) var(--space-lg);
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== PROPOSALS SECTION ===== */
  .proposals-section {
    margin-bottom: var(--space-2xl);
  }
  .proposals-header {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin-bottom: var(--space-lg);
  }
  .proposals-header h2 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--ink-primary);
  }
  .proposals-count {
    font-size: 0.6875rem;
    font-weight: 600;
    background: var(--gold);
    color: var(--navy);
    padding: 2px 10px;
    border-radius: 10px;
  }

  .proposal-card {
    background: var(--surface-1);
    border: 1.5px solid var(--surface-3);
    border-radius: 10px;
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    transition: border-color 0.15s;
  }
  .proposal-card:hover {
    border-color: var(--gold-dim);
  }
  .proposal-card.decided {
    opacity: 0.6;
  }

  .proposal-top {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
    flex-wrap: wrap;
  }

  .action-badge {
    font-size: 0.625rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
  }
  .action-badge--add {
    background: oklch(50% 0.14 160);
    color: oklch(98% 0.005 90);
  }
  .action-badge--update {
    background: oklch(72% 0.14 70);
    color: oklch(20% 0.05 70);
  }
  .action-badge--delete {
    background: oklch(55% 0.2 25);
    color: oklch(98% 0.005 90);
  }

  .proposal-title {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--ink-primary);
  }
  .proposal-date {
    font-size: 0.75rem;
    color: var(--ink-tertiary);
    font-weight: 500;
  }
  .proposal-desc {
    font-size: 0.8125rem;
    color: var(--ink-secondary);
    line-height: 1.55;
    margin: var(--space-xs) 0;
    max-width: 70ch;
  }
  .proposal-reason {
    font-size: 0.75rem;
    color: var(--ink-muted);
    font-style: italic;
    margin: var(--space-sm) 0;
    padding-left: var(--space-md);
    border-left: 3px solid var(--surface-3);
  }
  .proposal-topics {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin: var(--space-sm) 0;
  }

  .proposal-diff {
    background: var(--surface-2);
    border-radius: 6px;
    padding: var(--space-sm) var(--space-md);
    margin: var(--space-sm) 0;
    font-size: 0.75rem;
  }
  .proposal-diff-label {
    font-weight: 600;
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }
  .proposal-diff-old {
    color: oklch(55% 0.15 25);
    text-decoration: line-through;
  }
  .proposal-diff-new {
    color: oklch(40% 0.14 160);
  }

  .proposal-actions {
    display: flex;
    gap: var(--space-sm);
    margin-top: var(--space-md);
    align-items: center;
  }

  .btn-approve {
    background: var(--gold);
    color: var(--navy);
    font-weight: 600;
  }
  .btn-approve:hover {
    background: var(--gold-dim);
    color: var(--navy);
  }
  .btn-reject {
    background: var(--surface-3);
    color: var(--ink-secondary);
  }
  .btn-reject:hover {
    background: oklch(85% 0.01 260);
    color: var(--ink-primary);
  }
  .btn-undo {
    background: transparent;
    color: var(--ink-muted);
    text-decoration: underline;
    padding: 7px 8px;
  }
  .btn-undo:hover {
    color: var(--ink-primary);
  }

  .decision-status {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
  }
  .decision-approved {
    background: oklch(93% 0.04 160);
    color: oklch(35% 0.12 160);
  }
  .decision-rejected {
    background: oklch(93% 0.04 25);
    color: oklch(42% 0.12 25);
  }

  /* Inline indicators in milestones table */
  .indicator-new {
    display: inline-block;
    font-size: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    background: oklch(50% 0.14 160);
    color: oklch(98% 0.005 90);
    margin-left: 6px;
    vertical-align: middle;
  }
  .indicator-updated {
    display: inline-block;
    font-size: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 3px;
    background: oklch(72% 0.14 70);
    color: oklch(20% 0.05 70);
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Section divider */
  .section-divider {
    border: none;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--surface-3) 60%);
    margin: var(--space-2xl) 0;
  }

  @media (max-width: 640px) {
    .page { padding: var(--space-lg) var(--space-md); }
    .toolbar { flex-direction: column; align-items: stretch; }
    .tbl th:nth-child(3), .tbl td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="logo.png" alt="Theodo HealthTech" class="topbar-logo">
    <h1>Regulatory Timeline <span>Back Office</span></h1>
  </div>
  <a href="index.html" class="topbar-link">&larr; View timeline</a>
</div>

<div class="page">
  <!-- Proposals Section (dynamically populated) -->
  <div id="proposals-section"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" class="search" id="search" placeholder="Search milestones...">
      <span class="counter"><strong id="cnt-visible">0</strong> / <span id="cnt-total">0</span> visible</span>
    </div>
    <div class="toolbar-actions">
      <button class="btn btn-show" id="btn-show-all">Show all</button>
      <button class="btn btn-hide" id="btn-hide-all">Hide all</button>
    </div>
  </div>

  <table class="tbl" id="tbl">
    <thead>
      <tr>
        <th>Visible</th>
        <th>Date</th>
        <th>Topics</th>
        <th>Milestone</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="toast" id="toast">Saved</div>

<script>
let M = [];
let allProposals = [];

function cardId(m){ return m.d+"__"+m.t.slice(0,40).replace(/\W+/g,"_"); }

const TL={mdr:"EU MDR/IVDR",ai:"AI Act",standards:"Standards",cyber:"Cybersecurity",france:"France",uk:"UK",us:"US (FDA)",other:"Other Regions",data:"Data / EHDS"};
const TG={critical:"CRITICAL",high:"HIGH",medium:"MEDIUM","new":"NEW","in-force":"IN FORCE"};

/* ===== localStorage helpers ===== */
function getHidden(){
  try { return new Set(JSON.parse(localStorage.getItem("rw_hidden_cards")||"[]")); }
  catch(e){ return new Set(); }
}
function saveHidden(set){
  localStorage.setItem("rw_hidden_cards",JSON.stringify([...set]));
  showToast();
}
function getApprovedProposals(){
  try { return JSON.parse(localStorage.getItem("rw_approved_proposals")||"[]"); }
  catch(e){ return []; }
}
function saveApprovedProposals(arr){
  localStorage.setItem("rw_approved_proposals",JSON.stringify(arr));
}
function getRejectedProposals(){
  try { return JSON.parse(localStorage.getItem("rw_rejected_proposals")||"[]"); }
  catch(e){ return []; }
}
function saveRejectedProposals(arr){
  localStorage.setItem("rw_rejected_proposals",JSON.stringify(arr));
}
function getDeletedCards(){
  try { return JSON.parse(localStorage.getItem("rw_deleted_cards")||"[]"); }
  catch(e){ return []; }
}
function saveDeletedCards(arr){
  localStorage.setItem("rw_deleted_cards",JSON.stringify(arr));
}

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("visible");
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove("visible"),1200);
}

let hidden = getHidden();
let query = "";

/* ===== Proposals rendering ===== */
function renderProposals() {
  const container = document.getElementById("proposals-section");
  if (!allProposals.length) {
    container.innerHTML = "";
    return;
  }

  const approved = new Set(getApprovedProposals());
  const rejected = new Set(getRejectedProposals());

  // Build base card map for showing diffs on updates
  const baseCardMap = new Map();
  M.forEach(m => baseCardMap.set(cardId(m), m));

  let html = `<div class="proposals-section">`;
  html += `<div class="proposals-header"><h2>Pending Proposals</h2><span class="proposals-count">${allProposals.length}</span></div>`;

  allProposals.forEach(p => {
    const isApproved = approved.has(p.id);
    const isRejected = rejected.has(p.id);
    const isDecided = isApproved || isRejected;

    html += `<div class="proposal-card ${isDecided ? 'decided' : ''}">`;
    html += `<div class="proposal-top">`;
    html += `<span class="action-badge action-badge--${p.action}">${p.action.toUpperCase()}</span>`;

    if (p.card) {
      html += `<span class="proposal-date">${p.card.l || p.card.d}</span>`;
    } else if (p.action === "delete" && p.existing_id) {
      const existing = baseCardMap.get(p.existing_id);
      if (existing) html += `<span class="proposal-date">${existing.l || existing.d}</span>`;
    }

    html += `</div>`;

    // Title
    if (p.action === "delete" && p.existing_id) {
      const existing = baseCardMap.get(p.existing_id);
      html += `<div class="proposal-title">${existing ? existing.t : p.existing_id}</div>`;
      if (existing) {
        html += `<div class="proposal-desc">${existing.x}</div>`;
        html += `<div class="proposal-topics">${existing.tp.map(tp => `<span class="tp tp-${tp}">${TL[tp]||tp}</span>`).join("")}</div>`;
      }
    } else if (p.card) {
      html += `<div class="proposal-title">${p.card.t}</div>`;
      html += `<div class="proposal-desc">${p.card.x}</div>`;
      if (p.card.tp) {
        html += `<div class="proposal-topics">${p.card.tp.map(tp => `<span class="tp tp-${tp}">${TL[tp]||tp}</span>`).join("")}</div>`;
      }
    }

    // For UPDATE: show diff
    if (p.action === "update" && p.existing_id && p.card) {
      const old = baseCardMap.get(p.existing_id);
      if (old) {
        let diffs = [];
        if (old.t !== p.card.t) diffs.push({field:"Title", old:old.t, new:p.card.t});
        if (old.d !== p.card.d) diffs.push({field:"Date", old:old.l||old.d, new:p.card.l||p.card.d});
        if (old.x !== p.card.x) diffs.push({field:"Description", old:old.x, new:p.card.x});
        if (JSON.stringify(old.tp) !== JSON.stringify(p.card.tp)) diffs.push({field:"Topics", old:old.tp.join(", "), new:p.card.tp.join(", ")});
        if (JSON.stringify(old.tg) !== JSON.stringify(p.card.tg)) diffs.push({field:"Tags", old:old.tg.join(", "), new:p.card.tg.join(", ")});

        if (diffs.length) {
          html += `<div class="proposal-diff">`;
          html += `<div class="proposal-diff-label">Changes</div>`;
          diffs.forEach(d => {
            html += `<div><strong>${d.field}:</strong> <span class="proposal-diff-old">${d.old}</span> &rarr; <span class="proposal-diff-new">${d.new}</span></div>`;
          });
          html += `</div>`;
        }
      }
    }

    // Reason
    if (p.reason) {
      html += `<div class="proposal-reason">${p.reason}</div>`;
    }

    // Actions
    html += `<div class="proposal-actions">`;
    if (isApproved) {
      html += `<span class="decision-status decision-approved">Approved</span>`;
      html += `<button class="btn btn-undo" data-proposal-undo="${p.id}">Undo</button>`;
    } else if (isRejected) {
      html += `<span class="decision-status decision-rejected">Rejected</span>`;
      html += `<button class="btn btn-undo" data-proposal-undo="${p.id}">Undo</button>`;
    } else {
      html += `<button class="btn btn-approve" data-proposal-approve="${p.id}" data-action="${p.action}" data-existing="${p.existing_id||''}">Approve</button>`;
      html += `<button class="btn btn-reject" data-proposal-reject="${p.id}">Reject</button>`;
    }
    html += `</div>`;

    html += `</div>`; // .proposal-card
  });

  html += `</div><hr class="section-divider">`;
  container.innerHTML = html;
}

/* ===== Milestones table ===== */
function buildTable(){
  const tbody=document.getElementById("tbody");
  let html="";
  let lastYear=null;
  let visCount=0;

  // Determine which cards came from approved proposals
  const approvedIds = new Set(getApprovedProposals());
  const addedCardIds = new Set();
  const updatedCardIds = new Set();
  allProposals.forEach(p => {
    if (!approvedIds.has(p.id)) return;
    if (p.action === "add" && p.card) addedCardIds.add(cardId(p.card));
    if (p.action === "update" && p.card) updatedCardIds.add(cardId(p.card));
  });

  M.forEach(m=>{
    const id=cardId(m);
    const isHidden=hidden.has(id);

    // Search filter
    const q=query.toLowerCase();
    if(q && !m.t.toLowerCase().includes(q) && !m.x.toLowerCase().includes(q) && !m.tp.some(t=>TL[t].toLowerCase().includes(q))){
      return;
    }

    if(!isHidden) visCount++;

    // Year group
    if(m.y!==lastYear){
      html+=`<tr class="year-row"><td colspan="4"><span class="year-row-label">${m.y}</span></td></tr>`;
      lastYear=m.y;
    }

    const rowCls=isHidden?"row-hidden":"";
    html+=`<tr class="${rowCls}" data-id="${id}">`;
    html+=`<td class="cell-toggle"><label class="toggle"><input type="checkbox" ${isHidden?"":"checked"} data-id="${id}"><span class="toggle-track"></span></label></td>`;
    html+=`<td class="cell-date">${m.l}</td>`;
    html+=`<td><div class="cell-topics">${m.tp.map(p=>`<span class="tp tp-${p}">${TL[p]}</span>`).join("")}</div></td>`;

    let indicator = "";
    if (addedCardIds.has(id)) indicator = `<span class="indicator-new">NEW</span>`;
    else if (updatedCardIds.has(id)) indicator = `<span class="indicator-updated">UPDATED</span>`;

    html+=`<td><span class="cell-title">${m.tg.map(g=>`<span class="ms-tag tag-${g}">${TG[g]||g}</span>`).join("")} ${m.t}${indicator}</span></td>`;
    html+=`</tr>`;
  });

  tbody.innerHTML=html;
  document.getElementById("cnt-visible").textContent=visCount;
  document.getElementById("cnt-total").textContent=M.length;
}

/* ===== Event handlers ===== */

// Toggle handler for milestones table
document.getElementById("tbody").addEventListener("change",e=>{
  if(!e.target.matches("input[type=checkbox]"))return;
  const id=e.target.dataset.id;
  if(e.target.checked){ hidden.delete(id); }
  else{ hidden.add(id); }
  saveHidden(hidden);
  buildTable();
});

// Search
document.getElementById("search").addEventListener("input",e=>{
  query=e.target.value;
  buildTable();
});

// Show all
document.getElementById("btn-show-all").addEventListener("click",()=>{
  hidden.clear();
  saveHidden(hidden);
  buildTable();
});

// Hide all
document.getElementById("btn-hide-all").addEventListener("click",()=>{
  M.forEach(m=>hidden.add(cardId(m)));
  saveHidden(hidden);
  buildTable();
});

// Proposal actions (delegated)
document.getElementById("proposals-section").addEventListener("click", e => {
  const approveBtn = e.target.closest("[data-proposal-approve]");
  const rejectBtn = e.target.closest("[data-proposal-reject]");
  const undoBtn = e.target.closest("[data-proposal-undo]");

  if (approveBtn) {
    const pid = approveBtn.dataset.proposalApprove;
    const action = approveBtn.dataset.action;
    const existingId = approveBtn.dataset.existing;

    // Add to approved
    const approved = getApprovedProposals();
    if (!approved.includes(pid)) approved.push(pid);
    saveApprovedProposals(approved);

    // Remove from rejected if present
    const rejected = getRejectedProposals().filter(id => id !== pid);
    saveRejectedProposals(rejected);

    // If it's a delete action, add existing card to deleted list
    if (action === "delete" && existingId) {
      const deleted = getDeletedCards();
      if (!deleted.includes(existingId)) deleted.push(existingId);
      saveDeletedCards(deleted);
    }

    // If it's an add/update action, apply to M
    const proposal = allProposals.find(p => p.id === pid);
    if (proposal) {
      if (proposal.action === "add" && proposal.card) {
        const newId = cardId(proposal.card);
        if (!M.some(m => cardId(m) === newId)) {
          M.push(proposal.card);
          M.sort((a,b) => new Date(a.d) - new Date(b.d));
        }
      } else if (proposal.action === "update" && proposal.card && proposal.existing_id) {
        const idx = M.findIndex(m => cardId(m) === proposal.existing_id);
        if (idx !== -1) {
          M[idx] = proposal.card;
          M.sort((a,b) => new Date(a.d) - new Date(b.d));
        }
      } else if (proposal.action === "delete" && proposal.existing_id) {
        M = M.filter(m => cardId(m) !== proposal.existing_id);
      }
    }

    showToast();
    renderProposals();
    buildTable();
  }

  if (rejectBtn) {
    const pid = rejectBtn.dataset.proposalReject;

    const rejected = getRejectedProposals();
    if (!rejected.includes(pid)) rejected.push(pid);
    saveRejectedProposals(rejected);

    // Remove from approved if present
    const approved = getApprovedProposals().filter(id => id !== pid);
    saveApprovedProposals(approved);

    showToast();
    renderProposals();
  }

  if (undoBtn) {
    const pid = undoBtn.dataset.proposalUndo;

    // Find the proposal to check if it was a delete that needs reverting
    const proposal = allProposals.find(p => p.id === pid);

    // Remove from both approved and rejected
    saveApprovedProposals(getApprovedProposals().filter(id => id !== pid));
    saveRejectedProposals(getRejectedProposals().filter(id => id !== pid));

    // If it was an approved delete, remove from deleted cards and re-add the card
    if (proposal && proposal.action === "delete" && proposal.existing_id) {
      saveDeletedCards(getDeletedCards().filter(id => id !== proposal.existing_id));
    }

    // If it was an approved add, remove the added card from M
    if (proposal && proposal.action === "add" && proposal.card) {
      const addedId = cardId(proposal.card);
      M = M.filter(m => cardId(m) !== addedId);
    }

    // If it was an approved update, we need to reload to restore original
    // For simplicity, reload the page
    if (proposal && proposal.action === "update") {
      showToast();
      location.reload();
      return;
    }

    showToast();
    renderProposals();
    buildTable();
  }
});

/* ===== Init: fetch data ===== */
async function init() {
  try {
    const dataResp = await fetch("data.json");
    if (!dataResp.ok) throw new Error("Failed to load data.json");
    let baseMilestones = await dataResp.json();

    // Fetch proposals
    try {
      const propResp = await fetch("proposals.json");
      if (propResp.ok) {
        const propData = await propResp.json();
        allProposals = propData.proposals || [];
      }
    } catch(e) { allProposals = []; }

    const approvedIds = new Set(getApprovedProposals());
    const deletedCardsList = getDeletedCards();
    const deletedCards = new Set(deletedCardsList);

    // Remove deleted cards
    baseMilestones = baseMilestones.filter(m => !deletedCards.has(cardId(m)));

    // Build card map
    const cardMap = new Map();
    baseMilestones.forEach(m => cardMap.set(cardId(m), m));

    // Apply approved proposals
    allProposals.forEach(p => {
      if (!approvedIds.has(p.id)) return;

      if (p.action === "add" && p.card) {
        const newId = cardId(p.card);
        if (!cardMap.has(newId)) {
          baseMilestones.push(p.card);
          cardMap.set(newId, p.card);
        }
      } else if (p.action === "update" && p.card && p.existing_id) {
        const idx = baseMilestones.findIndex(m => cardId(m) === p.existing_id);
        if (idx !== -1) {
          baseMilestones[idx] = p.card;
          cardMap.delete(p.existing_id);
          cardMap.set(cardId(p.card), p.card);
        }
      }
    });

    baseMilestones.sort((a, b) => new Date(a.d) - new Date(b.d));
    M = baseMilestones;
  } catch(e) {
    console.error("Failed to initialize admin data:", e);
    M = [];
  }

  hidden = getHidden();
  renderProposals();
  buildTable();
}

init();
</script>
